<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký tài khoản — Quiz App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-head">
          <span class="brand-mark">
            <svg class="icon" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M19 8v6" /><path d="M22 11h-6" /></svg>
          </span>
          <h1>Tạo tài khoản mới</h1>
          <p>Đăng ký để trải nghiệm tạo và làm đề thi</p>
        </div>

        <div class="field">
          <label for="display_name">Tên hiển thị</label>
          <input type="text" id="display_name" placeholder="Ví dụ: Nguyễn Văn A" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="name@example.com" />
        </div>
        <div class="field">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>
        <div class="field" style="margin-bottom: 26px;">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" />
        </div>

        <button onclick="handleRegister()" class="btn btn-primary btn-block">
          Đăng ký
        </button>

        <p class="auth-footer">
          Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
        </p>
      </div>
    </div>

    <script>
      async function handleRegister() {
        const display_name = document
          .getElementById("display_name")
          .value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        if (!display_name || !email || !password || !confirmPassword) {
          alert("Vui lòng nhập đầy đủ thông tin!");
          return;
        }
        if (password !== confirmPassword) {
          alert("Mật khẩu xác nhận không trùng khớp!");
          return;
        }

        const res = await fetch(
          "https://quiz-backend-svt8.onrender.com/api/auth/register",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email,
              password,
              confirmPassword,
              display_name,
            }),
          },
        );
        const result = await res.json();
        alert(result.message);
        if (res.ok) window.location.href = "login.html";
      }
    </script>
  </body>
</html>
