<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-extrabold text-slate-800">Tạo Tài Khoản Mới</h1>
            <p class="text-slate-400 text-sm mt-1">Đăng ký để trải nghiệm tạo và làm đề thi</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Tên hiển thị</label>
                <input type="text" id="display_name" placeholder="Ví dụ: Nguyễn Văn A" 
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Email</label>
                <input type="email" id="email" placeholder="name@example.com" 
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Mật khẩu</label>
                <input type="password" id="password" placeholder="••••••••" 
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" 
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
            </div>

            <button onclick="handleRegister()" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition duration-150 shadow-lg shadow-indigo-100 mt-2">
                Đăng Ký
            </button>
        </div>

        <p class="text-center text-sm text-slate-500 mt-6">
            Đã có tài khoản? <a href="login.html" class="text-indigo-600 font-semibold hover:underline">Đăng nhập ngay</a>
        </p>
    </div>

<script>
async function handleRegister() {
    const display_name = document.getElementById("display_name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(!display_name || !email || !password || !confirmPassword) {
        alert("Vui lòng nhập đầy đủ thông tin!"); return;
    }
    if(password !== confirmPassword) {
        alert("Mật khẩu xác nhận không trùng khớp!"); return;
    }

    const res = await fetch("http://localhost:3000/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password, confirmPassword, display_name })
    });
    const result = await res.json();
    alert(result.message);
    if(res.ok) window.location.href = "login.html";
}
</script>
</body>
</html>
