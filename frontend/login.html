<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập — Quiz App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-head">
          <span class="brand-mark">
            <svg class="icon" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4" /><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" /></svg>
          </span>
          <h1>Chào mừng trở lại</h1>
          <p>Đăng nhập để vào hệ thống phòng thi</p>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="name@example.com" />
        </div>
        <div class="field" style="margin-bottom: 26px;">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>

        <button onclick="handleLogin()" class="btn btn-primary btn-block">
          Đăng nhập
        </button>

        <p class="auth-footer">
          Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </p>
      </div>
    </div>

    <script>
      async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        const res = await fetch(
          "https://quiz-backend-svt8.onrender.com/api/auth/login",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          },
        );
        const result = await res.json();
        if (res.ok) {
          localStorage.setItem("token", result.token);
          localStorage.setItem("user", JSON.stringify(result.user));
          window.location.href = "dashboard.html";
        } else {
          alert(result.message);
        }
      }
    </script>
  </body>
</html>
