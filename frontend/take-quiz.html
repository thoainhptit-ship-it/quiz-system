<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phòng thi trực tuyến — Quiz App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body style="padding-bottom: 48px;">
    <div class="topbar" style="position: sticky; top: 0; z-index: 50;">
      <div class="topbar-inner" style="max-width: 760px;">
        <div>
          <h1 id="quiz_title" style="font-family: var(--font-display); font-size: 17px; font-weight: 600; margin: 0; color: var(--ink);">
            Đang tải đề thi...
          </h1>
          <p id="quiz_desc" style="font-size: 12px; color: var(--ink-faint); margin: 2px 0 0 0;"></p>
        </div>
        <div class="timer-box">
          <span class="timer-label">Thời gian còn lại</span>
          <span id="timer" class="timer-value">00:00</span>
        </div>
      </div>
    </div>

    <div class="shell" style="max-width: 760px; margin-top: 28px;">
      <div id="quizContainer" style="display: flex; flex-direction: column; gap: 20px;"></div>

      <div style="margin-top: 32px; text-align: center;" id="actionArea">
        <button onclick="submitAnswers()" class="btn btn-primary" style="padding: 14px 48px;">
          Nộp bài lên hệ thống
        </button>
      </div>
    </div>

    <script>
      let quizData = JSON.parse(localStorage.getItem("quizData"));
      let countdownInterval;

      if (!quizData) {
        alert("Không tìm thấy dữ liệu phòng thi!");
        window.location.href = "enter-quiz.html";
      } else {
        initQuiz();
      }

      function initQuiz() {
        document.getElementById("quiz_title").innerText = quizData.title;
        document.getElementById("quiz_desc").innerText =
          quizData.description ||
          "Hãy đọc kỹ câu hỏi trước khi chọn phương án.";

        const container = document.getElementById("quizContainer");
        quizData.questions.forEach((q, idx) => {
          const qHtml = `
            <div class="q-slip question-card" data-qid="${q.id}">
                <div class="q-slip-head">
                  <span class="q-number">Câu ${String(idx + 1).padStart(2, "0")}</span>
                </div>
                <div class="q-slip-body">
                  <h3 style="font-size: 15px; font-weight: 600; color: var(--ink); margin: 0 0 14px 0; line-height: 1.5;">${q.question}</h3>
                  <div>
                      ${q.options
                        .map(
                          (opt) => `
                          <label class="answer-label">
                              <input type="radio" name="q_${q.id}" value="${opt.id}">
                              <span>${opt.option_text}</span>
                          </label>
                      `,
                        )
                        .join("")}
                  </div>
                </div>
            </div>
        `;
          container.insertAdjacentHTML("beforeend", qHtml);
        });

        let totalSeconds = quizData.time_limit * 60;
        const timerDisplay = document.getElementById("timer");

        countdownInterval = setInterval(() => {
          let mins = Math.floor(totalSeconds / 60);
          let secs = totalSeconds % 60;
          timerDisplay.innerText = `${mins < 10 ? "0" : ""}${mins}:${secs < 10 ? "0" : ""}${secs}`;
          if (totalSeconds <= 60) {
            timerDisplay.classList.add("is-urgent");
          }

          if (totalSeconds <= 0) {
            clearInterval(countdownInterval);
            alert("Đã hết thời gian làm bài! Hệ thống tự động nộp bài.");
            submitAnswers();
          }
          totalSeconds--;
        }, 1000);
      }

      async function submitAnswers() {
        clearInterval(countdownInterval);
        const cards = document.querySelectorAll(".question-card");
        let answers = [];

        cards.forEach((card) => {
          const qid = card.getAttribute("data-qid");
          const selected = card.querySelector(
            `input[name="q_${qid}"]:checked`,
          )?.value;
          answers.push({
            question_id: parseInt(qid),
            selected_option_id: selected ? parseInt(selected) : null,
          });
        });

        const token = localStorage.getItem("token");
    const res = await fetch("https://quiz-backend-svt8.onrender.com/api/quiz/submit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
          },
          body: JSON.stringify({ quiz_id: quizData.id, answers }),
        });

        const result = await res.json();
        if (res.ok) {
          showResults(result);
        } else {
          alert(result.message);
        }
      }

      function showResults(resData) {
        document.getElementById("actionArea").innerHTML =
          `<a href="dashboard.html" class="btn btn-secondary" style="padding: 13px 40px;">Quay về Dashboard</a>`;
        window.scrollTo({ top: 0, behavior: "smooth" });

        const headerScoreHtml = `
        <div class="slip slip--stamped" style="text-align: center; padding: 28px 24px; background: var(--navy-deep); border-color: var(--navy-deep);">
            <span style="font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.65);">Kết quả bài làm</span>
            <div style="font-family: var(--font-display); font-size: 48px; font-weight: 600; color: #fff; margin: 6px 0;">${resData.score}<span style="font-size: 18px; font-weight: 500; opacity: 0.7;"> / 10 điểm</span></div>
            <p style="font-size: 13.5px; color: rgba(255,255,255,0.85); margin: 0;">Bạn đã làm chính xác ${resData.correct} trên tổng số ${resData.total} câu hỏi.</p>
        </div>
    `;
        document
          .getElementById("quizContainer")
          .insertAdjacentHTML("afterbegin", headerScoreHtml);

        const inputs = document.querySelectorAll('input[type="radio"]');
        inputs.forEach((i) => (i.disabled = true));

        resData.reviewData.forEach((rev) => {
          const card = document.querySelector(
            `[data-qid="${rev.question_id}"]`,
          );
          if (card) {
            if (rev.isCorrect) {
              card.classList.add("border-correct");
            } else {
              card.classList.add("border-wrong");
            }
            const correctInput = card.querySelector(
              `input[value="${rev.correct_option_id}"]`,
            );
            if (correctInput) {
              correctInput.closest("label").classList.add("is-correct");
            }
            if (!rev.isCorrect && rev.selected_option_id) {
              const selectedInput = card.querySelector(
                `input[value="${rev.selected_option_id}"]`,
              );
              if (selectedInput) {
                selectedInput.closest("label").classList.add("is-wrong");
              }
            }
          }
        });
      }
    </script>
  </body>
</html>
