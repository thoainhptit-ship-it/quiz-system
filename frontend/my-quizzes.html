<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đề đã tạo — Quiz App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body>
    <div class="shell shell--wide" style="padding-top: 40px; padding-bottom: 60px;">
      <a href="dashboard.html" class="back-link">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M19 12H5" /><path d="M12 19l-7-7 7-7" /></svg>
        Quay lại Dashboard
      </a>

      <div class="flex-between" style="border-bottom: 1px solid var(--line); padding-bottom: 28px; margin-bottom: 32px; align-items: flex-end;">
        <div class="page-head" style="margin-bottom: 0;">
          <span class="eyebrow">Quản lý</span>
          <h1>Kho đề thi đã tạo</h1>
          <p>Quản lý mã phòng thi và xem chi tiết điểm số của học viên làm bài.</p>
        </div>
        <a href="create-quiz.html" class="btn btn-primary" style="flex-shrink: 0;">
          <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M12 5v14" /><path d="M5 12h14" /></svg>
          Soạn đề mới
        </a>
      </div>

      <div id="quizList" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div id="loadingState" class="state-block" style="grid-column: 1 / -1;">
          Đang tải danh sách đề thi của bạn...
        </div>
      </div>
    </div>

    <style>
      @media (max-width: 720px) {
        #quizList { grid-template-columns: 1fr !important; }
      }
    </style>

    <script>
      async function loadQuizzes() {
        const token = localStorage.getItem("token");
        if (!token) {
          window.location.href = "login.html";
          return;
        }

        try {
          const res = await fetch(
            "https://quiz-backend-svt8.onrender.com/api/quiz/my-quizzes",
            {
              headers: { Authorization: "Bearer " + token },
            },
          );

          if (!res.ok) throw new Error("Không thể lấy dữ liệu");

          const data = await res.json();
          const list = document.getElementById("quizList");

          const loadingState = document.getElementById("loadingState");
          if (loadingState) loadingState.remove();

          if (data.length === 0) {
            list.innerHTML = `
                <div class="state-block" style="grid-column: 1 / -1; border: 1px solid var(--line); background: var(--paper-raised);">
                    <svg class="icon icon-lg" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" /></svg>
                    <strong>Bạn chưa tạo đề thi nào</strong>
                    <a href="create-quiz.html" style="font-weight: 600; color: var(--navy-deep); text-decoration: none;">Bấm vào đây để tạo đề thi đầu tiên →</a>
                </div>
            `;
            return;
          }

          data.forEach((q) => {
            const quizCardHtml = `
                <div class="quiz-card">
                    <div>
                        <h3 title="${q.title}">${q.title}</h3>
                        <p class="desc">
                            ${q.description || "Không có mô tả chi tiết cho bộ đề thi này."}
                        </p>
                        <div class="chips">
                            <div class="code-chip">
                                <span class="label">Mã đề</span>
                                <span class="value" title="Click để bôi đen copy">${q.quiz_code}</span>
                            </div>
                            <div class="meta-chip">
                                <svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 3" /></svg>
                                ${q.time_limit || 0} phút
                            </div>
                        </div>
                    </div>

                    <button onclick="viewResults(${q.id})" class="btn btn-secondary btn-block">
                        <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M3 3v18h18" /><path d="M7 16l4-6 4 3 5-7" /></svg>
                        Xem danh sách điểm số
                    </button>
                </div>
            `;
            list.insertAdjacentHTML("beforeend", quizCardHtml);
          });
        } catch (err) {
          console.error(err);
          document.getElementById("quizList").innerHTML =
            `<div class="state-block error" style="grid-column: 1 / -1;">Lỗi kết nối máy chủ, không thể tải dữ liệu!</div>`;
        }
      }

      function viewResults(id) {
        localStorage.setItem("selectedQuizId", id);
        window.location.href = "creator-results.html";
      }

      document.addEventListener("DOMContentLoaded", loadQuizzes);
    </script>
  </body>
</html>
