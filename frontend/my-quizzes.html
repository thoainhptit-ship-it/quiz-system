<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đề đã tạo - Quiz App</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 font-sans min-h-screen text-slate-800">
    <div class="max-w-5xl mx-auto px-4 py-8">
      <div class="mb-6">
        <a
          href="dashboard.html"
          class="text-sm font-bold text-indigo-600 hover:text-indigo-700 flex items-center gap-1 transition"
        >
          <span>←</span> Quay lại Dashboard
        </a>
      </div>

      <div
        class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-200 pb-6 mb-8 gap-4"
      >
        <div>
          <h1 class="text-3xl font-black text-slate-800 tracking-tight">
            📚 Kho Đề Thi Đã Tạo
          </h1>
          <p class="text-slate-500 text-sm mt-1">
            Quản lý mã phòng thi và xem chi tiết điểm số của học viên làm bài
          </p>
        </div>
        <a
          href="create-quiz.html"
          class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-2.5 px-5 rounded-xl transition shadow-md shadow-indigo-100 flex items-center gap-1.5"
        >
          <span>➕</span> Soạn đề thi mới
        </a>
      </div>

      <div id="quizList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div
          id="loadingState"
          class="col-span-full text-center py-12 text-slate-400 font-medium"
        >
          ⏳ Đang tải danh sách đề thi của bạn...
        </div>
      </div>
    </div>

    <script>
      async function loadQuizzes() {
        const token = localStorage.getItem("token");
        if (!token) {
          window.location.href = "login.html";
          return;
        }

        try {
          const res = await fetch(
            "https://quiz-backend-svt8.onrender.com/api/quiz/my-quizzes",
            {
              headers: { Authorization: "Bearer " + token },
            },
          );

          if (!res.ok) throw new Error("Không thể lấy dữ liệu");

          const data = await res.json();
          const list = document.getElementById("quizList");

          const loadingState = document.getElementById("loadingState");
          if (loadingState) loadingState.remove();

          if (data.length === 0) {
            list.innerHTML = `
                <div class="col-span-full bg-white rounded-2xl border border-slate-200 p-12 text-center">
                    <p class="text-slate-400 text-base font-medium">Bạn chưa tạo đề thi nào trên hệ thống.</p>
                    <a href="create-quiz.html" class="inline-block text-sm font-bold text-indigo-600 hover:underline mt-2">Bấm vào đây để tạo đề thi đầu tiên!</a>
                </div>
            `;
            return;
          }

          data.forEach((q) => {
            const quizCardHtml = `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col justify-between transition-all hover:shadow-md duration-200">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800 line-clamp-1 mb-2" title="${q.title}">
                            📝 ${q.title}
                        </h3>
                        <p class="text-slate-400 text-xs line-clamp-2 mb-4 h-8">
                            ${q.description || "Không có mô tả chi tiết cho bộ đề thi này."}
                        </p>
                        
                        <div class="flex flex-wrap items-center gap-3 mb-6">
                            <div class="bg-indigo-50 border border-indigo-100 px-3 py-1.5 rounded-xl flex items-center gap-1.5">
                                <span class="text-xs font-bold text-indigo-600">MÃ ĐỀ:</span>
                                <span class="font-mono font-black text-sm text-indigo-700 tracking-wider select-all uppercase" title="Click để bôi đen copy">${q.quiz_code}</span>
                            </div>
                            <div class="bg-slate-100 text-slate-600 px-2.5 py-1.5 rounded-xl text-xs font-semibold">
                                ⏱️ ${q.time_limit || 0} phút
                            </div>
                        </div>
                    </div>

                    <button onclick="viewResults(${q.id})" 
                        class="w-full bg-slate-100 hover:bg-indigo-50 hover:text-indigo-600 text-slate-700 font-bold py-2.5 px-4 rounded-xl transition text-sm flex items-center justify-center gap-2 border border-transparent hover:border-indigo-200">
                        <span>📊</span> Xem danh sách điểm số
                    </button>
                </div>
            `;
            list.insertAdjacentHTML("beforeend", quizCardHtml);
          });
        } catch (err) {
          console.error(err);
          document.getElementById("quizList").innerHTML =
            `<div class="col-span-full text-center text-red-500 font-bold">Lỗi kết nối máy chủ không thể tải dữ liệu!</div>`;
        }
      }

      function viewResults(id) {
        localStorage.setItem("selectedQuizId", id);
        window.location.href = "creator-results.html";
      }

      // Tự động kích hoạt khi trang web load xong
      document.addEventListener("DOMContentLoaded", loadQuizzes);
    </script>
  </body>
</html>
