<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vào phòng thi — Quiz App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body style="background: var(--paper);">
    <div class="shell shell--narrow" style="padding-top: 40px;">
      <a href="dashboard.html" class="back-link">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M19 12H5" /><path d="M12 19l-7-7 7-7" /></svg>
        Về Dashboard
      </a>

      <div class="slip slip--stamped">
        <div class="slip-header">
          <h2>Nhập khoá phòng thi</h2>
          <span class="slip-tag">Truy cập</span>
        </div>
        <div class="slip-body">
          <p style="color: var(--ink-soft); font-size: 13.5px; margin: 0 0 24px 0;">
            Điền mã đề và mật khẩu phòng thi để bắt đầu làm bài.
          </p>

          <div class="field">
            <label for="quiz_code">Mã đề thi (Quiz code)</label>
            <input type="text" id="quiz_code" class="mono" placeholder="VD: MS-1234" />
          </div>
          <div class="field" style="margin-bottom: 26px;">
            <label for="quiz_password">Mật khẩu phòng</label>
            <input type="password" id="quiz_password" placeholder="••••••••" />
          </div>

          <button onclick="joinQuiz()" class="btn btn-primary btn-block">
            Bắt đầu làm bài
          </button>
        </div>
      </div>
    </div>

    <script>
      async function joinQuiz() {
        const quiz_code = document.getElementById("quiz_code").value.trim();
        const quiz_password = document
          .getElementById("quiz_password")
          .value.trim();

        if (!quiz_code || !quiz_password) {
          alert("Vui lòng nhập đầy đủ khóa phòng!");
          return;
        }

        const res = await fetch(
          "https://quiz-backend-svt8.onrender.com/api/quiz/join",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ quiz_code, quiz_password }),
          },
        );
        const result = await res.json();
        if (result.success) {
          localStorage.setItem("quizData", JSON.stringify(result.quiz));
          window.location.href = "take-quiz.html";
        } else {
          alert(result.message);
        }
      }
    </script>
  </body>
</html>
