<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thống kê kết quả — Quiz App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body>
    <div class="shell shell--wide" style="padding-top: 40px; padding-bottom: 60px;">
      <a href="my-quizzes.html" class="back-link">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M19 12H5" /><path d="M12 19l-7-7 7-7" /></svg>
        Trở lại kho đề thi đã tạo
      </a>

      <div class="page-head">
        <span class="eyebrow">Báo cáo</span>
        <h1>Kết quả phòng thi</h1>
        <p>Danh sách học viên đã tham gia làm bài, xếp hạng theo thời gian nộp bài.</p>
      </div>

      <div class="slip" style="padding: 0;">
        <div style="overflow-x: auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Tên học viên</th>
                <th style="text-align: center;">Số câu đúng</th>
                <th style="text-align: center;">Điểm số (Thang 10)</th>
                <th>Thời gian nộp bài</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr id="tableLoading">
                <td colspan="4" style="text-align: center; padding: 56px 20px; color: var(--ink-faint);">
                  Đang tải danh sách điểm từ hệ thống...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

<script>
async function loadResults() {
    const quizId = localStorage.getItem("selectedQuizId");
    const token = localStorage.getItem("token");

    if (!quizId || !token) {
        window.location.href = "my-quizzes.html";
        return;
    }

    try {
        const res = await fetch(`https://quiz-backend-svt8.onrender.com/api/quiz/results/${quizId}`, {
            headers: { 
                "Authorization": "Bearer " + token 
            }
        });

        const data = await res.json();
        const tbody = document.getElementById("tableBody");
        
        const loadingRow = document.getElementById("tableLoading");
        if(loadingRow) loadingRow.remove();

        if (!data || data.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="4" style="text-align: center; padding: 56px 20px; color: var(--ink-faint);">
                        Chưa có ai tham gia phòng thi này để ghi nhận điểm số.
                    </td>
                </tr>
            `;
            return;
        }

        data.forEach((r) => {
            let formattedTime = "Không rõ";
            if (r.submitted_at) {
                const dateObj = new Date(r.submitted_at);
                formattedTime = dateObj.toLocaleString('vi-VN', { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    day: '2-digit', 
                    month: '2-digit',
                    year: 'numeric'
                });
            }

            const scoreNum = parseFloat(r.score);
            const scoreClass = scoreNum >= 7.0 ? "pass" : "fail";

            tbody.innerHTML += `
                <tr>
                    <td style="font-weight: 600;">${r.display_name}</td>
                    
                    <td style="text-align: center; font-family: var(--font-mono);">
                        ${r.correct_answers} <span style="color: var(--ink-faint); margin: 0 2px;">/</span> ${r.total_questions}
                    </td>
                    
                    <td style="text-align: center;">
                        <span class="score-chip ${scoreClass}">${scoreNum.toFixed(2)}</span>
                    </td>
                    
                    <td style="font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-faint);">
                        ${formattedTime}
                    </td>
                </tr>
            `;
        });
    } catch (err) {
        console.error("Lỗi lấy dữ liệu kết quả:", err);
        document.getElementById("tableBody").innerHTML = `
            <tr>
                <td colspan="4" style="text-align: center; padding: 40px 20px; color: var(--red); font-weight: 600;">
                    Không thể kết nối với máy chủ để tải dữ liệu điểm số.
                </td>
            </tr>
        `;
    }
}

document.addEventListener("DOMContentLoaded", loadResults);
</script>
</body>
</html>
