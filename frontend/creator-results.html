<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống kê kết quả - Quiz App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <div class="mb-6">
            <a href="my-quizzes.html" class="text-sm font-bold text-indigo-600 hover:text-indigo-700 flex items-center gap-1 transition">
                <span>←</span> Trở lại kho đề thi đã tạo
            </a>
        </div>

        <div class="mb-8">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">📊 Kết Quả Phòng Thi</h1>
            <p class="text-slate-500 text-sm mt-1">Danh sách học viên đã tham gia làm bài, xếp hạng theo thời gian nộp bài</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100/80 border-b border-slate-200 text-xs font-bold uppercase tracking-wider text-slate-500">
                            <th class="py-4 px-6">Tên học viên</th>
                            <th class="py-4 px-6 text-center">Số câu đúng</th>
                            <th class="py-4 px-6 text-center">Điểm số (Thang 10)</th>
                            <th class="py-4 px-6">Thời gian nộp bài</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 text-sm font-medium text-slate-700">
                        <tr id="tableLoading">
                            <td colspan="4" class="text-center py-12 text-slate-400 font-medium bg-white">
                                ⏳ Đang tải danh sách điểm từ hệ thống...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

<script>
async function loadResults() {
    const quizId = localStorage.getItem("selectedQuizId");
    const token = localStorage.getItem("token");

    // Nếu thiếu thông tin xác thực, trả về trang danh sách đề
    if (!quizId || !token) {
        window.location.href = "my-quizzes.html";
        return;
    }

    try {
        // Gọi API đến server Render của bạn
        const res = await fetch(`https://quiz-backend-svt8.onrender.com/api/quiz/results/${quizId}`, {
            headers: { 
                "Authorization": "Bearer " + token 
            }
        });

        const data = await res.json();
        const tbody = document.getElementById("tableBody");
        
        // Xóa dòng thông báo Loading ban đầu đi
        const loadingRow = document.getElementById("tableLoading");
        if(loadingRow) loadingRow.remove();

        // Trường hợp phòng thi chưa có ai làm bài
        if (!data || data.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="4" class="text-center py-12 text-slate-400 font-medium bg-white">
                        📭 Chưa có ai tham gia phòng thi này để ghi nhận điểm số.
                    </td>
                </tr>
            `;
            return;
        }

        // Vòng lặp kết quả dữ liệu
        data.forEach((r) => {
            // Định dạng lại ngày giờ nộp bài thành kiểu Việt Nam (Giờ:Phút - Ngày/Tháng/Năm)
            let formattedTime = "Không rõ";
            if (r.submitted_at) {
                const dateObj = new Date(r.submitted_at);
                formattedTime = dateObj.toLocaleString('vi-VN', { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    day: '2-digit', 
                    month: '2-digit',
                    year: 'numeric'
                });
            }

            // Đổi màu sắc trạng thái điểm (Từ 7.0 điểm trở lên tô màu xanh lá, ngược lại tô màu cam ấm)
            const scoreNum = parseFloat(r.score);
            const scoreColor = scoreNum >= 7.0 
                ? "text-emerald-600 bg-emerald-50 border-emerald-200" 
                : "text-amber-600 bg-amber-50 border-amber-200";

            tbody.innerHTML += `
                <tr class="hover:bg-slate-50/50 transition duration-150">
                    <td class="py-4 px-6 font-semibold text-slate-800 flex items-center gap-2">
                        <span class="text-slate-400">👤</span> ${r.display_name}
                    </td>
                    
                    <td class="py-4 px-6 text-center font-mono font-bold text-slate-600">
                        ${r.correct_answers} <span class="text-slate-300 mx-0.5">/</span> ${r.total_questions}
                    </td>
                    
                    <td class="py-4 px-6 text-center">
                        <span class="inline-block font-mono font-black text-sm px-3 py-1 rounded-xl border ${scoreColor}">
                            ${scoreNum.toFixed(2)}
                        </span>
                    </td>
                    
                    <td class="py-4 px-6 text-xs font-semibold text-slate-400 tracking-wide">
                        📅 ${formattedTime}
                    </td>
                </tr>
            `;
        });
    } catch (err) {
        console.error("Lỗi lấy dữ liệu kết quả:", err);
        document.getElementById("tableBody").innerHTML = `
            <tr>
                <td colspan="4" class="text-center py-8 text-red-500 font-bold bg-white">
                    ❌ Không thể kết nối với máy chủ Render để tải dữ liệu điểm số!
                </td>
            </tr>
        `;
    }
}

// Tự động tải dữ liệu ngay khi trình duyệt xử lý xong cấu trúc DOM của trang
document.addEventListener("DOMContentLoaded", loadResults);
</script>
</body>
</html>
