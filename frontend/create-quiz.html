<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tạo đề thi — Quiz App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body>
    <div class="shell" style="padding-top: 40px; padding-bottom: 60px;">
      <a href="dashboard.html" class="back-link">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M19 12H5" /><path d="M12 19l-7-7 7-7" /></svg>
        Về Dashboard
      </a>

      <div class="page-head">
        <span class="eyebrow">Soạn đề mới</span>
        <h1>Thiết kế đề thi</h1>
        <p>Nhập thông tin chung, sau đó thêm từng câu hỏi và đánh dấu đáp án đúng.</p>
      </div>

      <div class="slip" style="margin-bottom: 28px;">
        <div class="slip-header">
          <h2>Thông tin chung</h2>
          <span class="slip-tag">Bắt buộc *</span>
        </div>
        <div class="slip-body">
          <div class="field-grid">
            <div class="field">
              <label for="title">Tên đề thi *</label>
              <input type="text" id="title" placeholder="Kiểm tra trắc nghiệm Lý thuyết" />
            </div>
            <div class="field">
              <label for="quiz_password">Mật khẩu phòng (Password) *</label>
              <input type="text" id="quiz_password" placeholder="Đặt mật khẩu phòng" />
            </div>
            <div class="field span-2">
              <label for="description">Mô tả ngắn</label>
              <textarea id="description" rows="2" placeholder="Nội dung hướng dẫn hoặc ghi chú đề thi..."></textarea>
            </div>
            <div class="field">
              <label for="time_limit">Thời gian làm bài (phút) *</label>
              <input type="number" id="time_limit" placeholder="Ví dụ: 15, 45" />
            </div>
          </div>
        </div>
      </div>

      <div id="questionsContainer" style="display: flex; flex-direction: column; gap: 20px;"></div>

      <div class="mb-actions">
        <button onclick="addQuestion()" class="btn btn-secondary">
          <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M12 5v14" /><path d="M5 12h14" /></svg>
          Thêm câu hỏi
        </button>
        <button onclick="submitQuiz()" class="btn btn-primary">
          Hoàn tất & xuất bản
          <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M5 12h14" /><path d="M13 5l7 7-7 7" /></svg>
        </button>
      </div>
    </div>

    <script>
      let questionCount = 0;
      function addQuestion() {
        questionCount++;
        const html = `
        <div class="q-slip question-box">
            <div class="q-slip-head">
                <span class="q-number">Câu ${String(questionCount).padStart(2, "0")}</span>
                <span class="q-hint">Chọn nút tròn để đánh dấu đáp án đúng</span>
            </div>
            <div class="q-slip-body">
                <div class="field" style="margin-bottom: 16px;">
                    <input type="text" class="question" placeholder="Nhập nội dung câu hỏi..." style="width: 100%; background: var(--paper); border: 1px solid var(--line-strong); border-radius: var(--radius); padding: 11px 14px; font-size: 14.5px; outline: none; font-family: var(--font-body); color: var(--ink);">
                </div>
                <div>
                    ${["A", "B", "C", "D"]
                      .map(
                        (label, idx) => `
                        <div class="option-row">
                            <input type="radio" name="correct${questionCount}" value="${idx}">
                            <span class="option-letter">${label}</span>
                            <input type="text" class="option" placeholder="Nội dung phương án">
                        </div>
                    `,
                      )
                      .join("")}
                </div>
            </div>
        </div>
    `;
        document
          .getElementById("questionsContainer")
          .insertAdjacentHTML("beforeend", html);
      }

      async function submitQuiz() {
        const title = document.getElementById("title").value;
        const description = document.getElementById("description").value;
        const time_limit = document.getElementById("time_limit").value;
        const quiz_password = document.getElementById("quiz_password").value;
        const questionBoxes = document.querySelectorAll(".question-box");

        if (!title || !quiz_password || questionBoxes.length === 0) {
          alert("Vui lòng nhập đầy đủ thông tin đề và câu hỏi!");
          return;
        }

        let questions = [];
        let isValid = true;
        questionBoxes.forEach((box, index) => {
          const questionText = box.querySelector(".question").value;
          const optionInputs = box.querySelectorAll(".option");
          const correctAnswer = box.querySelector(
            `input[name="correct${index + 1}"]:checked`,
          )?.value;

          let options = [];
          optionInputs.forEach((opt) => options.push(opt.value));
          if (!questionText || correctAnswer === undefined) isValid = false;

          questions.push({
            question: questionText,
            options: options,
            correctAnswer: parseInt(correctAnswer),
          });
        });

        if (!isValid) {
          alert(
            "Lỗi: Kiểm tra lại xem có câu hỏi nào bỏ trống hoặc chưa chọn đáp án đúng không!",
          );
          return;
        }

        const token = localStorage.getItem("token");
        const res = await fetch(
          "https://quiz-backend-svt8.onrender.com/api/quiz/create",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token,
            },
            body: JSON.stringify({
              title,
              description,
              time_limit,
              quiz_password,
              questions,
            }),
          },
        );
        const result = await res.json();
        if (res.ok) alert(`Tạo thành công! MÃ PHÒNG: ${result.quizCode}`);
        else alert(result.message);
      }
    </script>
  </body>
</html>
