<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng thi trực tuyến</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800 pb-12">
    <div class="sticky top-0 bg-white border-b border-slate-200 z-50 px-6 py-4 shadow-sm flex justify-between items-center">
        <div>
            <h1 id="quiz_title" class="font-bold text-lg text-slate-800">Đang tải đề thi...</h1>
            <p id="quiz_desc" class="text-xs text-slate-400"></p>
        </div>
        <div class="bg-amber-50 border border-amber-200 px-4 py-2 rounded-xl text-center">
            <span class="block text-[10px] uppercase font-bold text-amber-600 tracking-wider">Thời gian còn lại</span>
            <span id="timer" class="font-mono text-lg font-black text-amber-700">00:00</span>
        </div>
    </div>

    <div class="max-w-3xl mx-auto px-4 mt-6">
        <div id="quizContainer" class="space-y-6"></div>

        <div class="mt-8 text-center" id="actionArea">
            <button onclick="submitAnswers()" class="px-12 py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold rounded-xl transition shadow-lg shadow-indigo-100">
                Nộp Bài Lên Hệ Thống
            </button>
        </div>
    </div>

<script>
let quizData = JSON.parse(localStorage.getItem("quizData"));
let countdownInterval;

if(!quizData) {
    alert("Không tìm thấy dữ liệu phòng thi!"); window.location.href = "enter-quiz.html";
} else {
    initQuiz();
}

function initQuiz() {
    document.getElementById("quiz_title").innerText = "✍️ " + quizData.title;
    document.getElementById("quiz_desc").innerText = quizData.description || "Hãy đọc kỹ câu hỏi trước khi chọn phương án.";
    
    // Render câu hỏi công khai bảo mật (không lộ đáp án đúng)
    const container = document.getElementById("quizContainer");
    quizData.questions.forEach((q, idx) => {
        const qHtml = `
            <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm question-card" data-qid="${q.id}">
                <h3 class="font-bold text-slate-800 mb-3">Câu ${idx + 1}: ${q.question}</h3>
                <div class="space-y-2">
                    ${q.options.map(opt => `
                        <label class="flex items-center gap-3 p-3 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-100 transition">
                            <input type="radio" name="q_${q.id}" value="${opt.id}" class="w-4 h-4 text-indigo-600">
                            <span class="text-sm font-medium text-slate-700">${opt.option_text}</span>
                        </label>
                    `).join('')}
                </div>
            </div>
        `;
        container.insertAdjacentHTML("beforeend", qHtml);
    });

    // Kích hoạt bộ đếm ngược thời gian
    let totalSeconds = quizData.time_limit * 60;
    const timerDisplay = document.getElementById("timer");
    
    countdownInterval = setInterval(() => {
        let mins = Math.floor(totalSeconds / 60);
        let secs = totalSeconds % 60;
        timerDisplay.innerText = `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
        
        if (totalSeconds <= 0) {
            clearInterval(countdownInterval);
            alert("Đã hết thời gian làm bài! Hệ thống tự động nộp bài.");
            submitAnswers();
        }
        totalSeconds--;
    }, 1000);
}

async function submitAnswers() {
    clearInterval(countdownInterval);
    const cards = document.querySelectorAll(".question-card");
    let answers = [];

    cards.forEach(card => {
        const qid = card.getAttribute("data-qid");
        const selected = card.querySelector(`input[name="q_${qid}"]:checked`)?.value;
        answers.push({ question_id: parseInt(qid), selected_option_id: selected ? parseInt(selected) : null });
    });

    const token = localStorage.getItem("token");
    const res = await fetch("http://localhost:3000/api/quiz/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ quiz_id: quizData.id, answers })
    });

    const result = await res.json();
    if(res.ok) {
        showResults(result);
    } else {
        alert(result.message);
    }
}

function showResults(resData) {
    // Ẩn nút nộp bài, cuộn lên đầu trang
    document.getElementById("actionArea").innerHTML = `<a href="dashboard.html" class="inline-block px-8 py-3 bg-slate-600 text-white font-bold rounded-xl">Quay về Dashboard</a>`;
    window.scrollTo({ top: 0, behavior: 'smooth' });

    // Hiển thị hộp điểm số cực đẹp ở đầu
    const headerScoreHtml = `
        <div class="bg-indigo-600 text-white rounded-2xl p-6 text-center shadow-xl mb-6">
            <h2 class="text-lg font-bold uppercase tracking-wider opacity-80">Kết quả bài làm</h2>
            <div class="text-5xl font-black my-2">${resData.score} <span class="text-xl opacity-70">/ 10 điểm</span></div>
            <p class="text-sm">Bạn đã làm chính xác ${resData.correct} trên tổng số ${resData.total} câu hỏi.</p>
        </div>
    `;
    document.getElementById("quizContainer").insertAdjacentHTML("afterbegin", headerScoreHtml);

    // Vô hiệu hóa toàn bộ ô chọn & Đánh dấu màu câu Đúng / Sai
    const inputs = document.querySelectorAll('input[type="radio"]');
    inputs.forEach(i => i.disabled = true);

    resData.reviewData.forEach(rev => {
        const card = document.querySelector(`[data-qid="${rev.question_id}"]`);
        if(card) {
            if(rev.isCorrect) {
                card.classList.add("border-emerald-500", "bg-emerald-50/20");
            } else {
                card.classList.add("border-red-500", "bg-red-50/20");
            }
            // Tô xanh đáp án đúng của câu hỏi đó để người dùng nhận biết học lại
            const correctInput = card.querySelector(`input[value="${rev.correct_option_id}"]`);
            if(correctInput) {
                correctInput.closest('label').classList.add("bg-emerald-100", "border-emerald-400", "text-emerald-900");
            }
        }
    });
}
</script>
</body>
</html>
